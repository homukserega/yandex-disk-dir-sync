services:
  app:
    container_name: sync-yandex-disk-dir
    build: .
    restart: unless-stopped
    networks:
      - sync-yandex-disk-dir
    volumes:
      # Монтируем каталог из хоста в /app/data внутри контейнера
      - "${HOST_PATH:-./data}:/app/data:ro"
      - logs_volume:/app/logs:rw

volumes:
  logs_volume:

networks:
  sync-yandex-disk-dir:
    driver: bridge